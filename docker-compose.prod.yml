# Production compose — deployed by setup.sh to compose.yml
# Build context points to src/ symlink (cloned repo).

secrets:
  mqtt_password:
    file: __SECRETS_DIR__/mqtt_password.txt
  telegram_bot_token:
    file: __SECRETS_DIR__/telegram_bot_token.txt

services:
  bridge:
    build:
      context: ./src # The src/ is auto-created symlink
      dockerfile: Dockerfile
    container_name: smarthome-bridge
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - MQTT_BROKER=${MQTT_BROKER:-}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID:-}
      - MQTT_PASSWORD_FILE=/run/secrets/mqtt_password
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
    secrets:
      - mqtt_password
      - telegram_bot_token
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
